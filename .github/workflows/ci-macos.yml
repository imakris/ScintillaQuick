name: CI macOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: macOS / Qt 6.7.2 / shared=${{ matrix.build-shared }}
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        build-shared: [OFF, ON]

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.2
          arch: clang_64
          cache: true

      # Qt 6.7.2's macOS link interface still references the deprecated AGL
      # framework, which recent macOS SDKs (macos-latest) no longer ship,
      # producing "ld: framework 'AGL' not found". AGL is unused at runtime, so
      # provide an empty stub for the linker to resolve, and drop the unused
      # dependency from the output with -dead_strip_dylibs.
      - name: Provide an AGL framework stub for the linker
        run: |
          set -euo pipefail
          stub="$RUNNER_TEMP/agl-stub"
          mkdir -p "$stub/AGL.framework"
          printf 'int scintillaquick_agl_stub = 0;\n' > "$RUNNER_TEMP/agl_stub.c"
          clang -arch arm64 -arch x86_64 -dynamiclib \
            -o "$stub/AGL.framework/AGL" "$RUNNER_TEMP/agl_stub.c"
          echo "LDFLAGS=-F$stub -Wl,-dead_strip_dylibs" >> "$GITHUB_ENV"

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=${{ matrix.build-shared }}
          -DBUILD_TESTING=ON
          -DSCINTILLAQUICK_BUILD_EXAMPLES=ON
          -DSCINTILLAQUICK_BUILD_BENCHMARKS=ON
          -DSCINTILLAQUICK_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run unit tests (dispatch table)
        working-directory: build
        run: ctest -C Release --output-on-failure -R scintillaquick_dispatch_table_test

      - name: Run smoke + frame-validation tests (offscreen)
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
          QT_FONT_DPI: 96
          QT_SCALE_FACTOR: 1
          QT_ENABLE_HIGHDPI_SCALING: 0
        run: >
          ctest -C Release --output-on-failure
          -E "scintillaquick_visual_regression_test|scintillaquick_embedded_benchmark"

      - name: Install & test downstream consumer
        shell: bash
        run: |
          cmake --install build --prefix "$PWD/build/_install"
          mkdir -p build/_consumer
          cat > build/_consumer/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.24)
          project(scintillaquick_consumer_smoke LANGUAGES CXX)
          find_package(ScintillaQuick CONFIG REQUIRED)
          add_executable(consumer_smoke consumer.cpp)
          target_link_libraries(consumer_smoke PRIVATE ScintillaQuick::ScintillaQuick)
          EOF
          cat > build/_consumer/consumer.cpp <<'EOF'
          #include <scintillaquick/scintillaquick_item.h>
          int main() { return scintillaquick::version_major >= 0 ? 0 : 1; }
          EOF
          cmake -S build/_consumer -B build/_consumer/_build \
            -DCMAKE_PREFIX_PATH="$PWD/build/_install"
          cmake --build build/_consumer/_build --config Release
          export PATH="$PWD/build/_install/bin:$PATH"
          ./build/_consumer/_build/consumer_smoke
